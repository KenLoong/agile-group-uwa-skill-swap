<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover · UWA Skill-Swap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('root_index') }}">UWA Skill-Swap</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white-50" href="{{ url_for('posts.create_skill_post') }}">Create post</a>
        </div>
    </div>
</nav>
<main class="flex-grow-1 py-4">
    <div class="container">
        <header class="mb-3">
            <h1 class="h3">Browse skills</h1>
            <p class="text-muted small mb-0">
                Live filter wired to <code>GET {{ url_for('discover_filter.filter_posts') }}</code>.
                Homepage remains featured listings — this route is used for Selenium-stable discover checks.
            </p>
        </header>
        <div class="d-flex flex-wrap gap-2 mb-3" role="toolbar" aria-label="Category filters">
            <button type="button" class="btn btn-outline-primary btn-sm"
                    data-category="all">All</button>
            <button type="button" class="btn btn-outline-primary btn-sm"
                    data-category="languages">Languages</button>
            <button type="button" class="btn btn-outline-primary btn-sm"
                    data-category="coding">Coding</button>
        </div>
        <div id="post-grid" class="row g-3" aria-live="polite"></div>
        <noscript>This view requires JavaScript to load filtered cards.</noscript>
    </div>
</main>
<script src="{{ url_for('static', filename='js/discover_preview_loader.js') }}"></script>
</body>
</html>
